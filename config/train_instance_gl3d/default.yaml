experiment: resnet50-gem-instance-gl3d
data:
  train_datapath: data/GL3D/train
  train_set_name: gl3d_instance
  train_image_size: [388, 388]
  val_set_names: [gl3d_test]
  val_image_size: [512, 512]
  batch_size: 32
  num_workers: 4
  params: {
    pos_th: 0.25,
    pos_nums: 4
  }

model:
  backbone: resnet50
  aggregator: gem
  backbone_args: {
    unfreeze_n_blocks: 1, 
    pretrained: true,
    crop_last_block: false
  }
  aggregator_args: {}
  whitening: true
  whitening_dim: 1024

loss:
  module: src.losses 
  class: InstanceMetricLoss
  params:
    loss_fn_name: MultiSimilarityLoss
    miner_name: MultiSimilarityMiner

optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.0001
  backbone_lr: 0.00005
  aggregator_lr: 0.0002

scheduler:
  warmup_start_factor: 0.01
  warmup_ratio: 0.1

trainer:
  max_epochs: 1000
  accelerator: gpu
  devices: auto
  strategy: auto
  log_every_n_steps: 50
  gradient_clip_val: 1.0
  precision: 32
  sync_batchnorm: true
  check_val_every_n_epoch: 20
  monitor: gl3d_test-val/mAP
  checkpoint:
    save_last: true
    save_top_k: 3
    mode: max
  early_stopping:
    enabled: true
    patience: 10
    mode: max
    min_delta: 0.0
